url: https://statfungen.github.io/mfsusieR

template:
  bootstrap: 5
  light-switch: true
  math-rendering: katex
  bslib:
    base_font: { google: "Roboto" }
    heading_font: { google: "Roboto Slab" }
    code_font: { google: "JetBrains Mono" }

development:
  mode: auto

home:
  links:
    - text: Learn more
      href: https://github.com/StatFunGen/mfsusieR
    - text: Report a bug
      href: https://github.com/StatFunGen/mfsusieR/issues

#authors:
  # Add your package authors here following the same format
  # Example:
  # John Doe:
  #   href: https://johndoe.com/

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github, lightswitch]
  components:
    intro:
      icon: fa fa-play-circle
      text: Get Started
      href: articles/getting_started.html
      aria-label: Get started with mfsusieR
    reference:
      icon: fa fa-file-code
      text: Functions
      href: reference/index.html
      aria-label: Function reference
    articles:
      icon: fa fa-book-reader
      text: Vignettes
      href: articles/index.html
      aria-label: Articles and vignettes
    news:
      icon: fa fa-newspaper
      text: News
      href: news/index.html
      aria-label: Package news
    github:
      icon: fab fa-github
      href: https://github.com/StatFunGen/mfsusieR
      aria-label: View source on GitHub

# Optional: Organize your reference documentation
#reference:
#  - title: "Main Functions"
#    desc: "Core public-API functions"
#    contents:
#      - mfsusie
#      - fsusie
#  - title: "S3 methods"
#    desc: "Predict / coef / fitted / summary / print on the fit object"
#    contents:
#      - predict.mfsusie
#      - coef.mfsusie
#      - fitted.mfsusie

articles:
  - title: "Getting Started"
    navbar: ~
    contents:
      - getting_started

  - title: "Univariate (single-context, `fsusie()`)"
    desc: >
      Fine-mapping a single response: scalar SuSiE (T_m = 1),
      single-modality functional fSuSiE (T_m > 1), or the drop-in
      fsusie() wrapper. One context, one Y.
    contents:
      - fsusie_intro
      - fsusie_covariates_and_coloc
      - fsusie_dnam_case_study
      - fsusie_why_functional

  - title: "Multivariate (multi-context, `mfsusie()`)"
    desc: >
      Joint fine-mapping across multiple functional and univariate
      phenotypes via mfsusie(). Multiple contexts, list of Y.
    contents:
      - mfsusie_intro
      - mfsusie_long_running_fits

# Optional: Footer customization
footer:
  structure:
    left: developed_by
    right: built_with
