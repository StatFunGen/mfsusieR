url: https://statfungen.github.io/mfsusieR

template:
  bootstrap: 5
  light-switch: true
  math-rendering: katex
  bslib:
    base_font: { google: "Roboto" }
    heading_font: { google: "Roboto Slab" }
    code_font: { google: "JetBrains Mono" }

development:
  mode: auto

home:
  links:
    - text: Learn more
      href: https://github.com/StatFunGen/mfsusieR
    - text: Report a bug
      href: https://github.com/StatFunGen/mfsusieR/issues

#authors:
  # Add your package authors here following the same format
  # Example:
  # John Doe:
  #   href: https://johndoe.com/

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github, lightswitch]
  components:
    intro:
      icon: fa fa-play-circle
      text: Get Started
      href: articles/getting_started.html
      aria-label: Get started with mfsusieR
    reference:
      icon: fa fa-file-code
      text: Functions
      href: reference/index.html
      aria-label: Function reference
    articles:
      icon: fa fa-book-reader
      text: Vignettes
      href: articles/index.html
      aria-label: Articles and vignettes
    news:
      icon: fa fa-newspaper
      text: News
      href: news/index.html
      aria-label: Package news
    github:
      icon: fab fa-github
      href: https://github.com/StatFunGen/mfsusieR
      aria-label: View source on GitHub

# Optional: Organize your reference documentation
#reference:
#  - title: "Main Functions"
#    desc: "Core public-API functions"
#    contents:
#      - mfsusie
#      - fsusie
#  - title: "S3 methods"
#    desc: "Predict / coef / fitted / summary / print on the fit object"
#    contents:
#      - predict.mfsusie
#      - coef.mfsusie
#      - fitted.mfsusie

articles:
  - title: "Getting Started"
    navbar: ~
    contents:
      - getting_started

  - title: "Single-context functional regression fine-mapping using fSuSiE"
    desc: >
      Fine-mapping a single response. One Y, one set of predictor variables.
    contents:
      - fsusie_intro
      - fsusie_covariates_adjustment
      - fsusie_colocalization
      - fsusie_dnam_case_study
      - fsusie_gtex_case_study
      - fsusie_why_functional

  - title: "Multi-context functional regression fine-mapping using mfSuSiE"
    desc: >
      Joint fine-mapping across multiple functional and scalar
      responses. List of Y, shared variable selection.
    contents:
      - mfsusie_intro
      - mfsusie_long_running_fits
      - practical_data_applications

  - title: "Plotting and post-processing"
    contents:
      - post_processing

# Optional: Footer customization
footer:
  structure:
    left: developed_by
    right: built_with

news:
  releases:
    - text: "Version 0.0.1"
      href: https://github.com/StatFunGen/mfsusieR/releases/tag/v0.0.1
  cran_dates: false
