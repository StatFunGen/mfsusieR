name: Continuous Integration

on:
  push:
    branches: main
  pull_request:
    paths-ignore:
      - .github/*
      - .gitignore
      - README.md

jobs:
  ci_linux-64:
    name: linux-64 CI
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ["r44", "r45"]

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Copy TOML
        run: |
          mkdir /tmp/pixi
          cp ${GITHUB_WORKSPACE}/pixi.toml /tmp/pixi

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          run-install: false

      - name: Install susieR from GitHub master
        # mfsusieR depends on susieR internals not yet in r-susier conda.
        # GITHUB_PAT avoids the bundled-PAT 401 rate limit failure.
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: pixi run --environment ${{ matrix.environment }} --manifest-path /tmp/pixi/pixi.toml R -e 'remotes::install_github("stephenslab/susieR", upgrade = "never")'

      - name: Install coloc (CI-only, for cross-check tests)
        # coloc is intentionally NOT in DESCRIPTION Suggests; it is
        # used only by the susie_post_outcome_configuration pairwise
        # cross-check test, which is skipped when coloc is unavailable.
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: pixi run --environment ${{ matrix.environment }} --manifest-path /tmp/pixi/pixi.toml R -e 'install.packages("coloc", repos = "https://cloud.r-project.org")'

      - name: Run unit tests
        run: pixi run --environment ${{ matrix.environment }} --manifest-path /tmp/pixi/pixi.toml devtools_test

      - name: Run R CMD CHECK
        run: |
          pixi run --environment ${{ matrix.environment }} --manifest-path /tmp/pixi/pixi.toml build
          pixi run --environment ${{ matrix.environment }} --manifest-path /tmp/pixi/pixi.toml rcmdcheck

      - name: Report coverage
        if: ${{ matrix.environment == 'r44' }}
        run: pixi run --environment ${{ matrix.environment }} --manifest-path /tmp/pixi/pixi.toml coverage

  ci_osx-arm64:
    name: osx-arm64 CI
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ["r44", "r45"]

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Copy TOML
        run: |
          mkdir /tmp/pixi
          cp ${GITHUB_WORKSPACE}/pixi.toml /tmp/pixi

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          run-install: false

      - name: Install susieR from GitHub master
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: pixi run --environment ${{ matrix.environment }} --manifest-path /tmp/pixi/pixi.toml R -e 'remotes::install_github("stephenslab/susieR", upgrade = "never")'

      - name: Install coloc (CI-only, for cross-check tests)
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: pixi run --environment ${{ matrix.environment }} --manifest-path /tmp/pixi/pixi.toml R -e 'install.packages("coloc", repos = "https://cloud.r-project.org")'

      - name: Run unit tests
        run: pixi run --environment ${{ matrix.environment }} --manifest-path /tmp/pixi/pixi.toml devtools_test

      - name: Run R CMD CHECK
        run: |
          pixi run --environment ${{ matrix.environment }} --manifest-path /tmp/pixi/pixi.toml build
          pixi run --environment ${{ matrix.environment }} --manifest-path /tmp/pixi/pixi.toml rcmdcheck
