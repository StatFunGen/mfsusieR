[workspace]
name = "r-mfsusier"
channels = ["dnachun", "conda-forge", "bioconda"]
platforms = ["linux-64", "osx-arm64"]

[system-requirements]
libc = { family="glibc", version="2.17" }

[tasks]
devtools_document = "cd $GITHUB_WORKSPACE; R -e 'devtools::document()'"
devtools_test = "cd $GITHUB_WORKSPACE; R -e 'devtools::test()'"
coverage = "cd $GITHUB_WORKSPACE; R -e 'cov <- covr::package_coverage(quiet = TRUE); print(cov); cat(sprintf(\"\\nTotal coverage: %.2f%%\\n\", covr::percent_coverage(cov)))'"
build = "cd $GITHUB_WORKSPACE; R -e 'devtools::build(vignettes = TRUE)'"
rcmdcheck = "cd $GITHUB_WORKSPACE; R -e 'pkg <- list.files(\"..\", pattern = \".tar.gz\", full.names = TRUE); rcmdcheck::rcmdcheck(path = pkg[1], args = c(\"--as-cran\", \"--no-manual\"))'"
use_major_version = "cd $GITHUB_WORKSPACE; R -e 'usethis::use_version(which = \"major\", push = FALSE)'"
use_minor_version = "cd $GITHUB_WORKSPACE; R -e 'usethis::use_version(which = \"minor\", push = FALSE)'"
use_patch_version = "cd $GITHUB_WORKSPACE; R -e 'usethis::use_version(which = \"patch\", push = FALSE)'"
pkgdown_build = "cd $GITHUB_WORKSPACE; R -e 'pkgdown::build_site_github_pages(new_process = FALSE, install = TRUE)'"

[feature.r44]
dependencies = {"r-base" = "4.4.*"}

# r-smashr 1.2_7 on dnachun is pinned to r-base 4.4; only available
# for linux-64. Used by `mf_post_smooth(method = "smash")` which
# gates on `requireNamespace("smashr")`. r45 + osx-arm64 builds
# skip the smash method.
[feature.r44.target.linux-64.dependencies]
"r-smashr" = "*"

[feature.r45]
dependencies = {"r-base" = "4.5.*"}

[environments]
r44 = {features = ["r44"]}
r45 = {features = ["r45"]}

[dependencies]
# Core dependencies (from Imports / LinkingTo). These are
# cross-platform; mfsusieR itself runs on linux-64 and osx-arm64.
"r-cpp11" = "*"
"r-susier" = "*"
"r-wavethresh" = "*"
"r-mixsqp" = "*"
"r-ashr" = "*"
"r-ebnm" = "*"           # ebnm_point_normal / ebnm_point_laplace for per_scale_normal / per_scale_laplace
"r-matrixstats" = "*"
"r-laplacesdemon" = "*"  # Student-t kernel for small_sample_correction

# SuSiE-suite peers used by vignettes (cross-platform via
# the dnachun channel). mfsusieR's `fsusie_why_functional`
# vignette compares against `mvsusieR::mvsusie()`. Vignette
# chunks gate with `requireNamespace("mvsusieR", quietly = TRUE)`
# so the package still builds without it.
"r-mvsusier" = ">=0.2.0"

# Suggested dependencies (for testing and documentation).
"r-testthat" = "*"
"r-knitr" = "*"
"r-rmarkdown" = "*"

# Development tools.
"r-devtools" = "*"
"r-covr" = "*"
"r-rcmdcheck" = "*"
"r-pkgdown" = "*"
"r-remotes" = "*"       # for install_github("stephenslab/susieR") in CI
"r-jsonlite" = "*"      # for coverage.json shields.io endpoint
"r-decor" = "*"         # required by cpp11::cpp_register() during devtools::document()
"qpdf" = "*"

[target.linux-64.dependencies]
"gcc" = "*"

# Bioconductor packages used by the GTEx case-study vignette's
# Gviz multi-track figure. Bioconda does not ship osx-arm64
# builds for these; the vignette chunks gate with
# `requireNamespace("Gviz", quietly = TRUE)` so packages still
# build on osx-arm64 without these.
"bioconductor-gviz" = "*"
"bioconductor-genomicranges" = "*"
"bioconductor-iranges" = "*"
# Transitive Gviz / GenomeInfoDb data packages that bioconda
# does not always pull in automatically; required when pkgdown
# renders the GTEx vignette.
"bioconductor-genomeinfodb" = "*"
"bioconductor-genomeinfodbdata" = "*"
"bioconductor-summarizedexperiment" = "*"
"bioconductor-rtracklayer" = "*"
"bioconductor-biomart" = "*"

# `smashr` is moved to feature-specific deps below. The dnachun
# build of r-smashr 1.2_7 is pinned to r-base 4.3 or 4.4; it has
# no r-base 4.5 build, so it can only ride along with the r44
# environment.

# Vignette-only render dependencies for the methylation
# case-study data panels. Linux-64 only because some of these
# pull bioconda dependencies; vignette chunks gate with
# `requireNamespace("ggplot2", quietly = TRUE)` so the package
# still builds on osx-arm64 without them.
"r-ggplot2" = "*"
"r-cowplot" = "*"
"r-reshape2" = "*"
